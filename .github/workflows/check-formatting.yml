name: Check formatting

on:
  push:
  pull_request:

jobs:
  nixfmt:
    name: nixfmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable


      - name: Check Nix formatting
        run: nix fmt
